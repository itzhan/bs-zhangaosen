{% extends 'base.html' %}
{% block title %}注册 — 京东手机评论分析系统{% endblock %}
{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in">
    <div class="text-center mb-3">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:var(--radius-md);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.4rem;">
        <i class="bi bi-person-plus"></i>
      </div>
    </div>
    <h2 class="text-center">创建账号</h2>
    <p class="auth-subtitle text-center">注册以使用完整功能</p>

    <form method="post">
      <div class="mb-3">
        <label class="form-label">用户名</label>
        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">昵称（可选）</label>
        <input type="text" name="nickname" class="form-control" placeholder="请输入昵称">
      </div>
      <div class="mb-3">
        <label class="form-label">密码</label>
        <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
      </div>
      <div class="mb-4">
        <label class="form-label">确认密码</label>
        <input type="password" name="password2" class="form-control" placeholder="再次输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 py-2">
        <i class="bi bi-person-plus me-1"></i>注册
      </button>
    </form>
    <p class="text-center mt-3 mb-0" style="font-size:0.9rem;">
      已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a>
    </p>
  </div>
</div>
{% endblock %}
