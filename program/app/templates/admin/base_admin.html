<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}管理后台{% endblock %} — 京东手机评论分析</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <div class="admin-layout">
    <!-- 侧边栏 -->
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <div style="width:28px;height:28px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;">
          <i class="bi bi-gear"></i>
        </div>
        管理后台
      </div>
      <nav class="sidebar-nav">
        <a class="nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}" href="{{ url_for('admin.dashboard') }}">
          <i class="bi bi-speedometer2"></i>仪表板
        </a>
        <a class="nav-link {% if request.endpoint == 'admin.users' %}active{% endif %}" href="{{ url_for('admin.users') }}">
          <i class="bi bi-people"></i>用户管理
        </a>
        <a class="nav-link {% if request.endpoint == 'admin.brands' %}active{% endif %}" href="{{ url_for('admin.brands') }}">
          <i class="bi bi-phone"></i>品牌管理
        </a>
        <a class="nav-link {% if request.endpoint == 'admin.comments' %}active{% endif %}" href="{{ url_for('admin.comments') }}">
          <i class="bi bi-chat-dots"></i>评论管理
        </a>
        <a class="nav-link {% if request.endpoint == 'analysis.monitor' %}active{% endif %}" href="{{ url_for('analysis.monitor') }}">
          <i class="bi bi-activity"></i>系统监控
        </a>
        <hr style="border-color:rgba(255,255,255,0.1);margin:1rem 1.5rem;">
        <a class="nav-link" href="{{ url_for('main.index') }}">
          <i class="bi bi-arrow-left"></i>返回前台
        </a>
        <a class="nav-link" href="{{ url_for('auth.logout') }}">
          <i class="bi bi-box-arrow-right"></i>退出登录
        </a>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <div class="admin-content">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block admin_content %}{% endblock %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
